<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Customer</title>
</head>
<body>

<h2>Add Customer</h2>

<form th:action="@{/saveCustomers}" th:object="${customer}" method="post">

    <label>Name:</label>
    <input type="text" th:field="*{name}" required>
    <br><br>

    <label>Email:</label>
    <input type="email" th:field="*{email}" required>
    <br><br>

    <button type="submit">Save</button>

</form>

<br>
<a th:href="@{/customer}">Back to List</a>

</body>
</html>
